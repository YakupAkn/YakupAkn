<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drone Simülatör</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { margin: 0; overflow: hidden; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #020617; color: #f8fafc; }
        canvas { display: block; }
        .glass-panel {
            background: rgba(15, 23, 42, 0.85);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
        }
        input[type=range] {
            height: 6px;
            -webkit-appearance: none;
            background: #334155;
            border-radius: 5px;
            accent-color: #38bdf8;
        }
        .mode-active { background: #38bdf8 !important; color: #020617 !important; font-weight: bold; }
        .data-bar { height: 4px; background: #1e293b; border-radius: 2px; overflow: hidden; margin-top: 4px; }
        .data-fill { height: 100%; width: 0%; background: #38bdf8; transition: width 0.1s; }
        
        #playPauseBtn.active { background: #ef4444; color: white; border-color: #ef4444; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .status-on { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .status-off { background: #94a3b8; }
    </style>
</head>
<body>

    <!-- Üst Kontrol Paneli -->
    <div class="fixed top-6 left-6 z-10 space-y-4">
        <div class="glass-panel p-6 w-80">
            <h1 class="text-xl font-black mb-1 tracking-tighter text-sky-400 uppercase">Drone Lab Pro</h1>
            <div class="flex items-center text-[10px] text-slate-400 mb-4 uppercase tracking-widest">
                <span id="statusDot" class="status-dot status-off"></span>
                <span id="statusText">Sistem Beklemede</span>
            </div>
            
            <!-- Başlat / Durdur Butonu -->
            <button id="playPauseBtn" class="w-full py-3 mb-4 bg-sky-500/20 hover:bg-sky-500/30 text-sky-400 font-bold rounded-xl border border-sky-500/40 transition-all flex items-center justify-center gap-2">
                <span id="playIcon">▶</span> <span id="btnText">SİMÜLASYONU BAŞLAT</span>
            </button>

            <div class="flex gap-2 mb-6">
                <button id="modeTest" class="flex-1 py-2 text-[10px] rounded-lg bg-slate-700 transition mode-active uppercase">Test Standı</button>
                <button id="modeFlight" class="flex-1 py-2 text-[10px] rounded-lg bg-slate-700 transition uppercase">Serbest Uçuş</button>
            </div>

            <div class="space-y-4" id="motorControls">
                <!-- Motorlar -->
                <div class="motor-group" data-idx="0">
                    <div class="flex justify-between text-[10px] font-bold uppercase mb-1">
                        <span>M1 - Sol Ön</span>
                        <span id="m1-val" class="text-sky-400">0%</span>
                    </div>
                    <input type="range" id="m1" class="w-full" min="0" max="100" value="0">
                    <div class="data-bar"><div id="m1-fill" class="data-fill"></div></div>
                </div>
                <div class="motor-group" data-idx="1">
                    <div class="flex justify-between text-[10px] font-bold uppercase mb-1">
                        <span>M2 - Sağ Ön</span>
                        <span id="m2-val" class="text-sky-400">0%</span>
                    </div>
                    <input type="range" id="m2" class="w-full" min="0" max="100" value="0">
                    <div class="data-bar"><div id="m2-fill" class="data-fill"></div></div>
                </div>
                <div class="motor-group" data-idx="2">
                    <div class="flex justify-between text-[10px] font-bold uppercase mb-1">
                        <span>M3 - Sol Arka</span>
                        <span id="m3-val" class="text-sky-400">0%</span>
                    </div>
                    <input type="range" id="m3" class="w-full" min="0" max="100" value="0">
                    <div class="data-bar"><div id="m3-fill" class="data-fill"></div></div>
                </div>
                <div class="motor-group" data-idx="3">
                    <div class="flex justify-between text-[10px] font-bold uppercase mb-1">
                        <span>M4 - Sağ Arka</span>
                        <span id="m4-val" class="text-sky-400">0%</span>
                    </div>
                    <input type="range" id="m4" class="w-full" min="0" max="100" value="0">
                    <div class="data-bar"><div id="m4-fill" class="data-fill"></div></div>
                </div>
            </div>

            <div class="mt-6 flex gap-2">
                <button id="resetBtn" class="flex-1 py-2 bg-rose-500/10 hover:bg-rose-500/20 text-rose-400 text-[9px] font-bold rounded-lg transition border border-rose-500/20">SIFIRLA</button>
                <button id="stabilizeBtn" class="flex-1 py-2 bg-emerald-500/10 hover:bg-emerald-500/20 text-emerald-400 text-[9px] font-bold rounded-lg transition border border-emerald-500/20">STABİLİZE</button>
            </div>
        </div>
    </div>

    <!-- Telemetri Paneli -->
    <div class="fixed bottom-6 left-6 glass-panel p-4 w-80 text-[10px] font-mono grid grid-cols-2 gap-4">
        <div>
            <div class="text-slate-500 uppercase">Yükseklik</div>
            <div id="tel-alt" class="text-lg text-white font-bold">0.00 m</div>
        </div>
        <div>
            <div class="text-slate-500 uppercase">Dikey Hız</div>
            <div id="tel-vel" class="text-lg text-white font-bold">0.00 m/s</div>
        </div>
        <div>
            <div class="text-slate-500 uppercase">Roll (Yalpalama)</div>
            <div id="tel-roll" class="text-lg text-white font-bold">0.0°</div>
        </div>
        <div>
            <div class="text-slate-500 uppercase">Pitch (Yunuslama)</div>
            <div id="tel-pitch" class="text-lg text-white font-bold">0.0°</div>
        </div>
    </div>

    <script>
        let scene, camera, renderer, drone, testStand;
        let propellers = [];
        let simulationMode = 'test';
        let isRunning = false;
        
        let physics = {
            pos: new THREE.Vector3(0, 1.5, 0),
            rot: new THREE.Vector3(0, 0, 0),
            vel: new THREE.Vector3(0, 0, 0),
            angVel: new THREE.Vector3(0, 0, 0),
            mass: 2.5,
            gravity: 0.0075,
            airResistance: 0.985,
            groundY: 0.2
        };

        const motorSpeeds = [0, 0, 0, 0];
        const THRUST_COEFF = 0.0001; // Hızı biraz daha azalttım ki daha kontrollü olsun
        const TORQUE_COEFF = 0.035;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x020617);
            scene.fog = new THREE.Fog(0x020617, 15, 60);

            camera = new THREE.PerspectiveCamera(55, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(6, 4, 10);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            document.body.appendChild(renderer.domElement);

            // Lighting
            scene.add(new THREE.HemisphereLight(0xffffff, 0x111827, 1.2));
            const mainLight = new THREE.DirectionalLight(0x38bdf8, 1);
            mainLight.position.set(5, 10, 7);
            scene.add(mainLight);

            // Grid
            const grid = new THREE.GridHelper(200, 100, 0x1e293b, 0x0f172a);
            scene.add(grid);

            createDrone();
            createTestStand();
            setupInteractions();
            animate();
        }

        function createDrone() {
            drone = new THREE.Group();

            // Main Body
            const bodyMat = new THREE.MeshPhongMaterial({ color: 0x1e293b, shininess: 80 });
            const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.18, 0.9), bodyMat);
            drone.add(body);

            // Tech Unit
            const tech = new THREE.Mesh(new THREE.BoxGeometry(0.4, 0.15, 0.4), new THREE.MeshPhongMaterial({ color: 0x38bdf8 }));
            tech.position.y = 0.15;
            drone.add(tech);

            // Arms
            const armMat = new THREE.MeshPhongMaterial({ color: 0x020617 });
            const armGeo = new THREE.CylinderGeometry(0.045, 0.045, 1.8);
            
            const a1 = new THREE.Mesh(armGeo, armMat); a1.rotation.set(Math.PI/2, 0, Math.PI/4); drone.add(a1);
            const a2 = new THREE.Mesh(armGeo, armMat); a2.rotation.set(Math.PI/2, 0, -Math.PI/4); drone.add(a2);

            // Motors & Props
            const propGeo = new THREE.BoxGeometry(0.8, 0.01, 0.08);
            const propMat = new THREE.MeshPhongMaterial({ color: 0x000000, transparent: true, opacity: 0.85 });

            const pos = [
                {x: 0.65, z: 0.65}, {x: -0.65, z: 0.65},
                {x: 0.65, z: -0.65}, {x: -0.65, z: -0.65}
            ];

            pos.forEach((p, i) => {
                const motor = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 0.2), new THREE.MeshPhongMaterial({color: 0x475569}));
                motor.position.set(p.x, 0.1, p.z);
                
                const prop = new THREE.Mesh(propGeo, propMat);
                prop.position.y = 0.12;
                motor.add(prop);
                propellers.push(prop);
                drone.add(motor);
            });

            scene.add(drone);
        }

        function createTestStand() {
            testStand = new THREE.Group();
            const pole = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 1.5), new THREE.MeshPhongMaterial({color: 0x334155}));
            pole.position.y = 0.75;
            testStand.add(pole);
            const base = new THREE.Mesh(new THREE.CylinderGeometry(1.2, 1.4, 0.1, 32), new THREE.MeshPhongMaterial({color: 0x1e293b}));
            testStand.add(base);
            scene.add(testStand);
        }

        function setupInteractions() {
            // Play Pause Logic
            const ppBtn = document.getElementById('playPauseBtn');
            ppBtn.addEventListener('click', () => {
                isRunning = !isRunning;
                ppBtn.classList.toggle('active', isRunning);
                document.getElementById('playIcon').innerText = isRunning ? '⏸' : '▶';
                document.getElementById('btnText').innerText = isRunning ? 'SİMÜLASYONU DURDUR' : 'SİMÜLASYONU BAŞLAT';
                document.getElementById('statusDot').className = `status-dot ${isRunning ? 'status-on' : 'status-off'}`;
                document.getElementById('statusText').innerText = isRunning ? 'Sistem Aktif' : 'Sistem Beklemede';
            });

            // Motor Controls
            [1,2,3,4].forEach((n, i) => {
                const input = document.getElementById(`m${n}`);
                input.addEventListener('input', (e) => {
                    const v = parseFloat(e.target.value);
                    motorSpeeds[i] = v;
                    document.getElementById(`m${n}-val`).innerText = v + '%';
                    document.getElementById(`m${n}-fill`).style.width = v + '%';
                });
            });

            document.getElementById('modeTest').addEventListener('click', () => setMode('test'));
            document.getElementById('modeFlight').addEventListener('click', () => setMode('flight'));

            function setMode(m) {
                simulationMode = m;
                document.getElementById('modeTest').classList.toggle('mode-active', m === 'test');
                document.getElementById('modeFlight').classList.toggle('mode-active', m === 'flight');
                if(m === 'test') {
                    physics.pos.set(0, 1.55, 0);
                    physics.vel.set(0,0,0);
                    testStand.visible = true;
                } else {
                    testStand.visible = false;
                }
            }

            document.getElementById('resetBtn').addEventListener('click', () => {
                motorSpeeds.fill(0);
                [1,2,3,4].forEach(n => {
                    document.getElementById(`m${n}`).value = 0;
                    document.getElementById(`m${n}-val`).innerText = '0%';
                    document.getElementById(`m${n}-fill`).style.width = '0%';
                });
                physics.pos.set(0, 1.5, 0);
                physics.rot.set(0,0,0);
                physics.vel.set(0,0,0);
                physics.angVel.set(0,0,0);
                isRunning = false;
                ppBtn.classList.remove('active');
                document.getElementById('playIcon').innerText = '▶';
                document.getElementById('btnText').innerText = 'SİMÜLASYONU BAŞLAT';
            });

            document.getElementById('stabilizeBtn').addEventListener('click', () => {
                const h = 75; // Gravity match
                motorSpeeds.fill(h);
                [1,2,3,4].forEach(n => {
                    document.getElementById(`m${n}`).value = h;
                    document.getElementById(`m${n}-val`).innerText = h + '%';
                    document.getElementById(`m${n}-fill`).style.width = h + '%';
                });
            });

            // Camera handling
            let zoom = 12, ry = 0.8, rx = 0.4, isDown = false;
            window.addEventListener('wheel', e => zoom = Math.max(3, Math.min(40, zoom + e.deltaY * 0.01)));
            window.addEventListener('mousedown', () => isDown = true);
            window.addEventListener('mouseup', () => isDown = false);
            window.addEventListener('mousemove', e => { if(isDown) { ry -= e.movementX * 0.01; rx = Math.max(0.1, Math.min(1.5, rx + e.movementY * 0.01)); }});

            window.updateCam = () => {
                camera.position.set(physics.pos.x + zoom * Math.sin(ry) * Math.cos(rx), physics.pos.y + zoom * Math.sin(rx), physics.pos.z + zoom * Math.cos(ry) * Math.cos(rx));
                camera.lookAt(physics.pos);
            };
        }

        function updatePhysics() {
            // Pervaneler her zaman döner (Görsel geri bildirim için)
            propellers.forEach((p, i) => {
                p.rotation.y += motorSpeeds[i] * 0.15;
                p.material.opacity = 0.8 - (motorSpeeds[i] / 180);
            });

            if (!isRunning) return; // Simülasyon durdurulmuşsa fizik hesaplama

            const t1 = motorSpeeds[0] * THRUST_COEFF;
            const t2 = motorSpeeds[1] * THRUST_COEFF;
            const t3 = motorSpeeds[2] * THRUST_COEFF;
            const t4 = motorSpeeds[3] * THRUST_COEFF;
            const totalT = t1 + t2 + t3 + t4;

            if (simulationMode === 'flight') {
                physics.vel.y += (totalT * Math.cos(physics.rot.x) * Math.cos(physics.rot.z)) - physics.gravity;
                physics.vel.y *= physics.airResistance;
                physics.pos.y += physics.vel.y;

                if (physics.pos.y < physics.groundY) {
                    physics.pos.y = physics.groundY;
                    physics.vel.y = 0;
                }

                physics.vel.x += Math.sin(physics.rot.z) * totalT;
                physics.vel.z -= Math.sin(physics.rot.x) * totalT;
                physics.vel.x *= physics.airResistance;
                physics.vel.z *= physics.airResistance;
                physics.pos.x += physics.vel.x;
                physics.pos.z += physics.vel.z;
            }

            const pTorque = (t3 + t4) - (t1 + t2);
            const rTorque = (t2 + t4) - (t1 + t3);
            physics.angVel.x += pTorque * TORQUE_COEFF;
            physics.angVel.z += rTorque * TORQUE_COEFF;
            physics.angVel.multiplyScalar(0.94);
            physics.rot.x += physics.angVel.x;
            physics.rot.z += physics.angVel.z;

            drone.position.copy(physics.pos);
            drone.rotation.set(physics.rot.x, 0, physics.rot.z);

            // Update Telemetry
            document.getElementById('tel-alt').innerText = physics.pos.y.toFixed(2) + ' m';
            document.getElementById('tel-vel').innerText = (physics.vel.y * 60).toFixed(2) + ' m/s';
            document.getElementById('tel-roll').innerText = (physics.rot.z * 180 / Math.PI).toFixed(1) + '°';
            document.getElementById('tel-pitch').innerText = (physics.rot.x * 180 / Math.PI).toFixed(1) + '°';
        }

        function animate() {
            requestAnimationFrame(animate);
            updatePhysics();
            if(window.updateCam) window.updateCam();
            renderer.render(scene, camera);
        }

        window.onload = init;
        window.onresize = () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        };
    </script>
</body>
</html>
